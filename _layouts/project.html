<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">

{%- include head.html -%}

<body class="project-body">
  <header class="project-header">
    <div class="container">
      <a class="project-home-link" href="{{ '/' | relative_url }}">Kai Liu</a>
      <p class="project-kicker">{{ page.kicker }}</p>
      <h1>{{ page.title }}</h1>
      <p class="project-subtitle">{{ page.subtitle }}</p>
    </div>
  </header>

  <main class="project-main" aria-label="Project content">
    <article class="container project-article">
      {{ content }}
    </article>
  </main>
</body>

</html>
