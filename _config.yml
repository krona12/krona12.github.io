# About Section
about_title: About
about_profile_image: assets/profile.png
about_content: |
  Kai Liu received the B.E. degree in Automation from the School of Automation, Central South University in 2025. He is currently pursuing the M.S. degree in Software Engineering at Xi'an Jiaotong University.

  His research interests include embodied intelligence, vision-language navigation, vision-language-action models, computer vision, and physically grounded 3D asset generation for robotics.

content:
  - title: Research Focus
    layout: text
    content: |
      I am interested in building embodied agents that can connect language, perception, memory, geometry, and action. My recent work spans open-vocabulary navigation, landmark-grounded spatial reasoning, articulated 3D asset generation, and surveys of Vision-Language-Action systems.

      **Standalone project pages:** [LANDER-Nav](/projects/lander-nav/) and [PhysArtGen](/projects/physartgen/).

  - title: Selected Work
    layout: list
    content:
      - layout: top-right
        title: LANDER-Nav
        sub_title: Progressive Landmark-Schema Grounding for Multi-Granularity Open-Vocabulary Navigation
        caption: AAAI submission, first author | 2026.3-present
        link: /projects/lander-nav/
        link_text: Project page
        additional_links: []
        quote: >
          A navigation framework that grounds free-form language into target-anchor-context-relation landmark schemas.
        description: |
          LANDER-Nav addresses multi-granularity open-vocabulary navigation, where an embodied agent must locate category-, region-, or instance-level targets in unseen environments. The method avoids compressing complex instructions into a single query and instead performs progressive grounding over frontier evidence, object-memory entity binding, and verifiable endpoint selection.

          It introduces role-conditioned spatial voting, landmark-anchored object binding, and Landmark-Ray Endpoint Search. On LangMap, Overall SR/SPL improves from 42.0/25.3 to 45.5/28.6 compared with MTU3D, with stronger gains on region- and instance-level targets.

      - layout: top-right
        title: PhysArtGen
        sub_title: Interactive and Physically Controllable Articulated 3D Assets Generation
        caption: AAAI submission, second author | 2025.7-2026.2
        link: /projects/physartgen/
        link_text: Project page
        additional_links: []
        quote: >
          A text-conditioned pipeline for generating articulated 3D assets that can be compiled into URDF and used in robotic interaction.
        description: |
          PhysArtGen targets scalable creation of diverse, physically coherent, and interactive 3D assets for embodied intelligence. The framework goes from semantic understanding, to part-level 3D generation, to Actor-Critic-Verifier URDF optimization.

          I participated in the Physics Adapter design for preserving relative part scale and position, the multi-agent URDF refinement pipeline, PhysArtSet construction, and experimental evaluation. PhysArtSet covers 29 object categories, 16 canonical part types, over 1,000 high-quality instances, and 2,800 synthesized parts.

      - layout: top-right
        title: Embodied AI Large Models Survey
        sub_title: A Comprehensive Review and Future Perspectives on Embodied AI Large Models
        caption: Published in Radio Engineering, second author | 2025.6-2025.9
        additional_links: []
        quote: >
          A survey of Vision-Language-Action models, embodied AI resources, and open research challenges.
        description: |
          This survey reviews embodied AI large models with a focus on VLA systems. It summarizes visual encoders, language backbones, multimodal fusion strategies, action-token modeling, diffusion- and flow-based continuous action generation, simulators, datasets, benchmarks, and evaluation metrics.

          The review covers resources such as AI2-THOR, Habitat, Isaac Sim/Gym, OXE, BridgeData V2, ALFRED, and LIBERO, and discusses challenges including generalization, data efficiency, long-horizon reasoning, and real-time response.

