        sub_title: B.E. in Automation
        caption: 2021.9-2025.6
        description: |
          Weighted GPA: 91.64/100. Undergraduate rank: 4/27. CET-6: 578.

  - title: Selected Work
    layout: list
    content:
      - layout: top-right
        title: LANDER-Nav
        sub_title: Progressive Landmark-Schema Grounding for Open-Vocabulary Navigation
        caption: Project showcase, first author
        link: /projects/lander-nav/
        link_text: Overview
        additional_links: []
        quote: >
          Landmark-guided reasoning for open-vocabulary embodied navigation.
        description: |
          LANDER-Nav explores how an embodied agent can use target, anchor, context, and relation cues from natural language to navigate toward more precise goals in unseen environments.

      - layout: top-right
        title: PhysArtGen
        sub_title: Interactive and Physically Controllable Articulated 3D Assets
        caption: Project showcase, second author
        link: /projects/physartgen/
        link_text: Overview
        additional_links: []
        quote: >
          A related project on articulated 3D assets for embodied simulation.
        description: |
          PhysArtGen generates articulated assets that can be assembled into URDF and used for robot interaction in simulation. My work focuses on physical-consistency design, URDF optimization, dataset construction, and evaluation.

      - layout: top-right
        title: Embodied AI Large Models Survey
        sub_title: A Comprehensive Review and Future Perspectives on Embodied AI Large Models
        caption: Survey paper, second author
        additional_links: []
        quote: >
          A survey of Vision-Language-Action models and embodied AI systems.
        description: |
          This survey summarizes VLA model architectures, multimodal fusion, action generation, simulation platforms, datasets, benchmarks, and open challenges in embodied AI.

